{% extends "base.html" %}
{% block title %}Login – TaskFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-logo">✅</span>
            <h1>Welcome back</h1>
            <p>Sign in to manage your tasks</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••" required />
            </div>
            <div class="form-group form-check">
                <input type="checkbox" id="remember" name="remember" />
                <label for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            <p id="formError" class="form-error hidden"></p>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("formError");
    errEl.classList.add("hidden");

    const body = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        remember: document.getElementById("remember").checked,
    };

    const res = await fetch("{{ url_for('auth.login') }}", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
    });

    const data = await res.json();
    if (data.success) {
        window.location.href = "{{ url_for('tasks.dashboard') }}";
    } else {
        errEl.textContent = data.error || "Login failed.";
        errEl.classList.remove("hidden");
    }
});
</script>
{% endblock %}
